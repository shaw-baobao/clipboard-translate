name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          swiftc translate-popup.swift -o translate-popup -O
          tar czf clipboard-translate-${{ matrix.arch }}.tar.gz \
            translate-popup \
            clipboard-translate.sh \
            com.clipboard-translate.plist \
            install.sh

      - uses: actions/upload-artifact@v4
        with:
          name: clipboard-translate-${{ matrix.arch }}
          path: clipboard-translate-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            clipboard-translate-arm64.tar.gz
            clipboard-translate-x86_64.tar.gz
