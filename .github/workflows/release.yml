name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: |
          swiftc translate-popup.swift -o translate-popup-arm64 -O -target arm64-apple-macosx13.0
          swiftc translate-popup.swift -o translate-popup-x86_64 -O -target x86_64-apple-macosx13.0
          lipo -create translate-popup-arm64 translate-popup-x86_64 -output translate-popup
          file translate-popup
          tar czf clipboard-translate-macos-universal.tar.gz \
            translate-popup \
            clipboard-translate.sh \
            com.clipboard-translate.plist \
            install.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: clipboard-translate-macos-universal.tar.gz
